<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS - CUISINE</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .fade-out {
            transition: all 0.5s ease;
            opacity: 0; transform: scale(0.9); height: 0; margin: 0; padding: 0; overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col p-2">

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="login-overlay" class="fixed inset-0 bg-gray-900 z-50 flex flex-col items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 w-80">
            <div class="w-16 h-16 bg-gray-700 rounded-full mx-auto mb-4 flex items-center justify-center">
                <i class="fas fa-lock text-2xl text-blue-500"></i>
            </div>
            <h2 class="text-xl font-bold mb-6 text-white text-center" id="login-title">Connexion</h2>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Email / Compte</label>
                    <input type="email" id="login-email" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Mot de passe</label>
                    <input type="password" id="login-password" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none">
                </div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-all">
                    SE CONNECTER
                </button>
                <p id="login-error" class="text-red-500 text-xs text-center hidden">Identifiants incorrects.</p>
            </form>
        </div>
    </div>

    <div id="main-content" class="w-full hidden flex-col max-w-7xl mx-auto">
        
        <div class="w-full flex justify-between items-center mb-6 px-2 py-2 border-b border-gray-800">
            <h1 class="text-xl font-bold flex items-center">
                <i class="fas fa-fire text-orange-500 mr-2"></i> <span>CUISINE (KDS)</span>
            </h1>
            <div class="flex items-center">
                <div class="flex items-center bg-gray-800 px-3 py-1 rounded-full border border-gray-700 mr-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></div>
                    <span class="text-xs text-gray-400">Live</span>
                </div>
                <button onclick="window.location.reload()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-white border border-gray-600">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-20">
            <div class="col-span-full text-center text-gray-500 py-20 text-xl">En attente de commandes...</div>
        </div>
    </div>

    <script type="module" src="./firebase-config.js"></script>

    <script>
        const ADMIN_PIN = "1234";
        let currentPin = "";
        let isFirstLoad = true;

        // PIN 逻辑
        // ================= 🔒 真实身份验证 (Firebase Auth) =================
        function initAuth() {
            if (!window.auth) { setTimeout(initAuth, 500); return; }

            // 监听登录状态：如果员工昨天登录过，今天打开页面直接进，不用再输密码！
            window.Auth.onAuthStateChanged(window.auth, (user) => {
                if (user) {
                    console.log("Connecté en tant que:", user.email);
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    document.getElementById('main-content').classList.add('flex');
                    
                    // 这里写原本成功进入后应该运行的函数
                     startKDSListener();
                    // counter.html 写: startCounterListener();
                    // menu.html 写: loadProducts(); loadRewards();
                } else {
                    document.getElementById('login-overlay').classList.remove('hidden');
                }
            });
        }

        // 提交登录表单
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');

            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; err.classList.add('hidden');

            try {
                // 核心：请求 Firebase 云端验证密码
                await window.Auth.signInWithEmailAndPassword(window.auth, email, pass);
                // 成功后，onAuthStateChanged 会自动触发，关闭弹窗并加载数据
            } catch (error) {
                err.classList.remove('hidden');
                err.textContent = "Erreur: Email ou mot de passe incorrect.";
            } finally {
                btn.disabled = false; btn.innerHTML = 'SE CONNECTER';
            }
        }

        // 页面加载时启动验证监控
        document.addEventListener('DOMContentLoaded', initAuth);

        // KDS 逻辑
        // ================= KDS 逻辑 (只监听今天的新订单) =================
        function startKDSListener() {
            if (!window.db) { setTimeout(startKDSListener, 500); return; }
            const { collection, query, where, orderBy, onSnapshot } = window.Firestore;

            // 🔴 1. 获取今天的凌晨 00:00:00 时间戳
            const startOfToday = new Date();
            startOfToday.setHours(0, 0, 0, 0);

            // 🔴 2. 修改查询条件：仅加载今天创建的、状态为 pending 的订单
            const q = query(
                collection(window.db, "Orders"),
                where("createdAt", ">=", startOfToday), // 新增：过滤今天的单子
                where("status", "==", "pending"),
                orderBy("createdAt", "desc") // 依然保持最新的单子排在最前面
            );

            onSnapshot(q, (snapshot) => {
                const orders = [];
                let hasNew = false;
                snapshot.docChanges().forEach((change) => { if (change.type === "added") hasNew = true; });
                if (hasNew && !isFirstLoad) playAlertSound();
                isFirstLoad = false;

                snapshot.forEach((doc) => {
                    const d = doc.data();
                    let timeStr = "...";
                    if (d.createdAt && d.createdAt.toDate) timeStr = d.createdAt.toDate().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                    orders.push({ id: doc.id, ...d, time: timeStr });
                });
                renderOrders(orders);
            });
        }

        function renderOrders(orders) {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            if (orders.length === 0) { list.innerHTML = '<div class="col-span-full text-center text-gray-600 py-20 text-xl font-mono">EN ATTENTE DE COMMANDES...</div>'; return; }

            orders.forEach((order, index) => {
                const isNew = index === 0;
                const card = document.createElement('div');
                card.className = `order-card flex flex-col justify-between bg-gray-900 border-2 ${isNew ? 'border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.3)]' : 'border-gray-700'} rounded-xl p-0 overflow-hidden h-full min-h-[300px]`;
                
                let itemsHtml = '';
                if (Array.isArray(order.items)) {
                    itemsHtml = order.items.map(item => `<div class="flex items-start text-lg"><span class="text-yellow-400 mr-2 min-w-[30px] text-right font-bold">${item.quantity}x</span><span class="text-gray-100 font-bold">${item.name}</span></div>`).join('');
                }

                card.innerHTML = `
                <div class="flex justify-between items-center p-3 ${isNew ? 'bg-green-900/30' : 'bg-gray-800'} border-b border-gray-700">
                    <div class="flex items-center"><span class="text-3xl font-black ${order.table === '---' ? 'text-blue-400' : 'text-white'}">${order.table === '---' ? '<i class="fas fa-bag-shopping"></i>' : order.table}</span>${isNew ? '<span class="ml-3 bg-green-600 text-white text-xs px-2 py-1 rounded font-bold animate-pulse">NOUVEAU</span>' : ''}</div>
                    <span class="text-xl font-mono text-gray-400">${order.time}</span>
                </div>
                <div class="p-4 flex-grow overflow-y-auto space-y-2">${itemsHtml}${order.notes ? `<div class="mt-4 bg-red-900/40 border-l-4 border-red-500 p-2 text-red-200 font-bold text-lg animate-pulse"><i class="fas fa-exclamation-triangle mr-2"></i>${order.notes}</div>` : ''}</div>
                <div class="p-3 border-t border-gray-700 bg-gray-800/50"><button onclick="completeOrder('${order.id}', this)" class="w-full bg-green-700 hover:bg-green-600 text-white text-2xl font-bold py-4 rounded-lg shadow-lg active:scale-95 transition-all flex items-center justify-center"><i class="fas fa-check-circle mr-3"></i> TERMINÉ</button></div>`;
                list.appendChild(card);
            });
        }

        async function completeOrder(docId, btn) {
            const card = btn.closest('.order-card');
            card.classList.add('fade-out');
            try { await window.Firestore.updateDoc(window.Firestore.doc(window.db, "Orders", docId), { status: "completed" }); } 
            catch (e) { console.error(e); card.classList.remove('fade-out'); }
        }
        function playAlertSound() { document.getElementById('alert-sound').play().catch(e => console.log("Sound autoplay blocked")); }
    </script>
</body>
</html>
